<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card-header">
      <h1>CINE<span style="opacity:0.8;">VERSE</span></h1>
      <p>Sign in to your account</p>
    </div>
    <div class="auth-card-body">
      @if (errorMessage) {
        <div class="alert-dark-danger mb-3">{{ errorMessage }}</div>
      }
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" formControlName="username"
            placeholder="Enter your username"
            [ngClass]="{'is-invalid': isInvalid('username')}" />
          @if (isInvalid('username')) {
            <div class="invalid-feedback">Username is required.</div>
          }
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password"
            placeholder="Enter your password"
            [ngClass]="{'is-invalid': isInvalid('password')}" />
          @if (isInvalid('password')) {
            <div class="invalid-feedback">Password is required.</div>
          }
        </div>
        <button class="btn-auth" type="submit">Sign In</button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a [routerLink]="'/register'">Create one</a>
    </div>
  </div>
</div>
