<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card-header">
      <h1>CINE<span style="opacity:0.8;">VERSE</span></h1>
      <p>Create your account</p>
    </div>
    <div class="auth-card-body" style="text-align:center;">
      <p style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.95rem;">
        Sign up with your email, Google, or GitHub.<br />
        Your account is secured by Auth0.
      </p>
      <button class="btn-auth" (click)="signUp()" style="width:100%;">
        Create Account
      </button>
    </div>
    <div class="auth-footer">
      Already have an account? <a [routerLink]="'/login'">Sign in</a>
    </div>
  </div>
</div>
